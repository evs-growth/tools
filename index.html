<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booksy Nail Price Lab</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- React & ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<!-- jsPDF for PDF Generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
   
body {
font-family: 'Poppins', sans-serif;
background-color: #f8fafc;
}


/* Enhanced Visibility for Editable Fields */
.editable-container {
position: relative;
display: flex;
align-items: center;
width: 100%;
}


input[type="number"], input[type="text"] {
background-color: #ffffff;
border: 2px solid rgba(11, 163, 173, 0.4);
border-radius: 8px;
/* Reduced padding to maximize character space */
padding: 8px 26px 8px 10px;
transition: all 0.2s;
color: #2A2C32;
font-weight: 600;
width: 100%;
font-size: 13px;
line-height: 1.2;
}


input:hover {
border-color: #0BA3AD;
background-color: #f0fdfa;
}


input:focus {
background-color: white !important;
border-color: #0BA3AD !important;
box-shadow: 0 0 0 4px rgba(11, 163, 173, 0.2);
outline: none;
}


.pencil-indicator {
position: absolute;
right: 6px;
pointer-events: none;
color: #0BA3AD;
opacity: 0.4;
}


.animate-in {
animation: fadeIn 0.4s ease-out;
}


@keyframes fadeIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}


input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
-webkit-appearance: none;
margin: 0;
}


.custom-scrollbar::-webkit-scrollbar {
width: 4px;
}
.custom-scrollbar::-webkit-scrollbar-track {
background: #EEEEEE;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
background: #0BA3AD;
border-radius: 10px;
}


:root {
--brand-main: #0BA3AD;
--brand-gray: #EEEEEE;
--brand-black: #2A2C32;
--brand-alt1: #E2FD96;
--brand-alt2: #F9C9C4;
}
</style>
<script>
tailwind.config = {
theme: {
extend: {
colors: {
brand: {
main: '#0BA3AD',
gray: '#EEEEEE',
black: '#2A2C32',
alt1: '#E2FD96',
alt2: '#F9C9C4',
}
}
}
}
}
</script>
</head>
<body class="text-brand-black">
<div id="root"></div>


<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;


const Icon = ({ name, size = 18, className = "" }) => {
useEffect(() => {
if (window.lucide) {
window.lucide.createIcons();
}
}, [name]);
return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
};


// EditableInput outside App to prevent focus loss
const EditableInput = ({ type = "text", value, onChange, className = "", placeholder = "", prefix = null }) => (
<div className="editable-container">
{prefix && <span className="absolute left-2 text-brand-main font-bold text-[10px] z-10">{prefix}</span>}
<input
type={type}
value={value}
onChange={onChange}
className={`${className} ${prefix ? 'pl-5' : ''}`}
placeholder={placeholder}
/>
<Icon name="pencil" size={10} className="pencil-indicator" />
</div>
);


const App = () => {
const savedData = JSON.parse(localStorage.getItem('booksy_lab_data') || '{}');


const [activeTab, setActiveTab] = useState('foundation');
const [showProductPicker, setShowProductPicker] = useState(false);
const [isAddedFeedback, setIsAddedFeedback] = useState(false);
   
const [businessName, setBusinessName] = useState(savedData.businessName || 'My Beauty Lab');
const [weeklyHours, setWeeklyHours] = useState(savedData.weeklyHours || 24);
const [desiredHourlyWage, setDesiredHourlyWage] = useState(savedData.desiredHourlyWage || 10);
   
const [tools, setTools] = useState(savedData.tools || [
{ id: 1, name: 'LED Lamp', replaceMonths: 12, price: 29.99 },
{ id: 2, name: 'Cuticle Clipper', replaceMonths: 2, price: 1.82 }
]);


const [fixedExpenses, setFixedExpenses] = useState(savedData.fixedExpenses || [
{ id: 1, name: 'Insurance', amount: 34.99 },
{ id: 2, name: 'Rent', amount: 0 },
{ id: 3, name: 'Booksy Subscription', amount: 30.00 }
]);


const [inventory, setInventory] = useState(savedData.inventory || {
cosmetic: [
{ id: 'c1', name: 'Disinfectant', capacity: 100, price: 50 },
{ id: 'c2', name: 'Primer', capacity: 10, price: 20 },
{ id: 'c3', name: 'Base coat', capacity: 10, price: 10 }
],
disposable: [
{ id: 'd1', name: 'Nail file', packSize: 5, price: 23 },
{ id: 'd2', name: 'Wipes', packSize: 100, price: 5 }
],
nonDisposable: [
{ id: 'nd1', name: 'Cuticle clippers', uses: 100, price: 10 },
{ id: 'nd2', name: 'Round bit', uses: 50, price: 15 }
]
});


const [service, setService] = useState({
name: 'GEL MANICURE',
duration: 60,
selections: {
cosmetic: [{ id: 'c1', usage: 20 }, { id: 'c3', usage: 2 }],
disposable: [{ id: 'd1', qty: 1 }],
nonDisposable: [{ id: 'nd1' }]
}
});


const [savedServicesList, setSavedServicesList] = useState(savedData.savedServicesList || []);


useEffect(() => {
const dataToSave = {
businessName,
weeklyHours,
desiredHourlyWage,
tools,
fixedExpenses,
inventory,
savedServicesList
};
localStorage.setItem('booksy_lab_data', JSON.stringify(dataToSave));
}, [businessName, weeklyHours, desiredHourlyWage, tools, fixedExpenses, inventory, savedServicesList]);


const monthlyHours = weeklyHours * 4.33;
const totalMonthlyFixed = useMemo(() =>
fixedExpenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0)
, [fixedExpenses]);


const toolHourlyCost = useMemo(() => {
return tools.reduce((sum, t) => {
const costPerMonth = (Number(t.price) || 0) / (Number(t.replaceMonths) || 1);
const costPerHour = (costPerMonth / 4.33) / (weeklyHours || 1);
return sum + costPerHour;
}, 0);
}, [tools, weeklyHours]);


const overheadPerHour = (totalMonthlyFixed / (monthlyHours || 1)) + toolHourlyCost;
const baseRatePerHour = desiredHourlyWage + overheadPerHour;


const calculateServicePrice = (svc) => {
let pCost = 0;
svc.selections.cosmetic.forEach(sel => {
const item = inventory.cosmetic.find(i => i.id === sel.id);
if (item) pCost += (sel.usage / item.capacity) * item.price;
});
svc.selections.disposable.forEach(sel => {
const item = inventory.disposable.find(i => i.id === sel.id);
if (item) pCost += (sel.qty / item.packSize) * item.price;
});
svc.selections.nonDisposable.forEach(sel => {
const item = inventory.nonDisposable.find(i => i.id === sel.id);
if (item) pCost += item.price / item.uses;
});
const labor = (svc.duration / 60) * baseRatePerHour;
return { total: labor + pCost, labor, products: pCost };
};


const currentPriceData = calculateServicePrice(service);


const addTool = () => setTools([...tools, { id: Date.now(), name: 'New Tool', replaceMonths: 12, price: 0 }]);
const addBill = () => setFixedExpenses([...fixedExpenses, { id: Date.now(), name: 'New Expense', amount: 0 }]);
   
const addInventoryItem = (category) => {
const newItem = category === 'cosmetic'
? { id: 'c' + Date.now(), name: 'New Cosmetic', capacity: 100, price: 0 }
: category === 'disposable'
? { id: 'd' + Date.now(), name: 'New Disposable', packSize: 1, price: 0 }
: { id: 'nd' + Date.now(), name: 'New Tool', uses: 100, price: 0 };
   
setInventory({ ...inventory, [category]: [...inventory[category], newItem] });
};


const removeInventoryItem = (category, id) => {
const nextItems = inventory[category].filter(item => item.id !== id);
setInventory({ ...inventory, [category]: nextItems });
};


const toggleProductInService = (category, itemId) => {
const currentSels = service.selections[category];
const exists = currentSels.find(s => s.id === itemId);
   
let nextSels;
if (exists) {
nextSels = currentSels.filter(s => s.id !== itemId);
} else {
const newItem = category === 'cosmetic' ? { id: itemId, usage: 1 } : category === 'disposable' ? { id: itemId, qty: 1 } : { id: itemId };
nextSels = [...currentSels, newItem];
}
   
setService({
...service,
selections: { ...service.selections, [category]: nextSels }
});
};


const saveServiceToList = () => {
setSavedServicesList([...savedServicesList, { ...service, id: Date.now() }]);
setIsAddedFeedback(true);
   
// Reset service builder fields
setService({
name: 'NEW SERVICE',
duration: 60,
selections: {
cosmetic: [],
disposable: [],
nonDisposable: []
}
});


// Clear feedback text after 2 seconds
setTimeout(() => setIsAddedFeedback(false), 2000);
};


const SectionHeader = ({ title, iconName, onAdd, description, tip }) => (
<div className="mb-4">
<div className="flex items-center justify-between border-b border-brand-main/20 pb-2">
<div className="flex items-center gap-2">
<div className="p-1.5 bg-brand-main text-white rounded shadow-sm">
<Icon name={iconName} size={16} />
</div>
<h3 className="font-bold text-brand-black text-sm uppercase tracking-wide">{title}</h3>
</div>
{onAdd && (
<div className="flex items-center gap-2">
{tip && <span className="text-[10px] text-brand-main font-medium italic hidden sm:inline">{tip}</span>}
<button onClick={onAdd} className="bg-brand-main text-white p-1 rounded-full hover:bg-brand-black transition-colors shadow-md">
<Icon name="plus" size={16} />
</button>
</div>
)}
</div>
{description && <p className="mt-2 text-[11px] text-slate-500 leading-relaxed font-medium">{description}</p>}
</div>
);


const PriceListContent = () => (
<div className="animate-in">
{savedServicesList.length === 0 ? (
<div className="bg-white p-12 rounded-3xl border border-dashed border-brand-main/30 text-center">
<Icon name="clipboard-list" size={48} className="mx-auto text-brand-gray mb-4" />
<h4 className="text-slate-400 font-medium">Your price list is empty</h4>
<p className="text-slate-300 text-xs mt-1">Build and save services to see them here.</p>
</div>
) : (
<div className="grid grid-cols-1 gap-4">
{savedServicesList.map(saved => {
const dynamic = calculateServicePrice(saved);
return (
<div key={saved.id} className="bg-white p-5 rounded-2xl border border-brand-gray shadow-sm flex items-center justify-between group hover:border-brand-main transition-colors">
<div>
<h4 className="font-bold text-brand-black text-sm uppercase tracking-tight">{saved.name}</h4>
<div className="flex gap-3 mt-1">
<span className="text-[10px] text-brand-main font-bold flex items-center gap-1 uppercase tracking-wider"><Icon name="clock" size={10} /> {saved.duration} min</span>
<span className="text-[10px] text-slate-400 font-medium flex items-center gap-1 uppercase"><Icon name="package" size={10} /> {saved.selections.cosmetic.length + saved.selections.disposable.length + saved.selections.nonDisposable.length} items</span>
</div>
</div>
<div className="text-right flex items-center gap-4">
<div className="bg-brand-alt1/30 px-3 py-1 rounded-lg">
<p className="text-[9px] font-black text-brand-main uppercase tracking-widest">Suggested</p>
<p className="text-2xl font-black text-brand-black">${Math.ceil(dynamic.total)}</p>
</div>
<button onClick={() => setSavedServicesList(savedServicesList.filter(s => s.id !== saved.id))} className="text-slate-300 hover:text-red-500 transition-colors">
<Icon name="trash-2" size={16} />
</button>
</div>
</div>
);
})}
</div>
)}
</div>
);


const NextTabButton = ({ target, label = "Next Step" }) => (
<div className="mt-12 flex justify-center border-t border-brand-gray pt-8">
<button
onClick={() => {
setActiveTab(target);
// Scroll to the top of the tab container so users see the new section clearly
document.getElementById('tab-top-anchor')?.scrollIntoView({ behavior: 'smooth' });
}}
className="bg-brand-main text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl hover:bg-brand-black transition-all transform active:scale-95 flex items-center gap-3 group"
>
{label} <Icon name="arrow-right" size={18} className="group-hover:translate-x-1 transition-transform" />
</button>
</div>
);


return (
<div className="min-h-screen pb-20">
<header className="bg-brand-black px-6 h-20 shadow-lg">
<div className="max-w-6xl mx-auto h-full flex items-center justify-between">
<div className="flex items-center gap-4">
<div className="bg-white p-1 rounded-lg">
<img src="https://wp.logos-download.com/wp-content/uploads/2021/01/Booksy_Logo.png?dl"
 onerror="this.src='https://placehold.co/100x40?text=Booksy'"
 alt="Logo" className="h-7 w-auto" />
</div>
<div className="h-6 w-px bg-white/20"></div>
<h1 className="text-white text-sm font-bold tracking-widest uppercase opacity-80">Price Lab</h1>
</div>
</div>
</header>


<main className="max-w-6xl mx-auto px-4 py-8">
{/* Tab Anchor for Navigation Scroll */}
<div id="tab-top-anchor" className="scroll-mt-24"></div>


<div className="flex flex-wrap bg-white p-1 rounded-2xl shadow-sm border border-brand-gray mb-10 gap-1 overflow-x-auto no-scrollbar">
{[
{ id: 'foundation', label: 'Foundation', icon: 'settings' },
{ id: 'inventory', label: 'Stock Room', icon: 'package' },
{ id: 'service', label: 'Builder', icon: 'calculator' },
{ id: 'pricelist', label: 'Price Menu', icon: 'clipboard-list' },
{ id: 'help', label: 'Guide', icon: 'help-circle' }
].map(tab => (
<button
key={tab.id}
onClick={() => setActiveTab(tab.id)}
className={`flex-1 min-w-[120px] py-3 px-2 rounded-xl flex items-center justify-center gap-2 transition-all font-bold text-xs uppercase tracking-wider ${activeTab === tab.id ? 'bg-brand-main text-white shadow-lg' : 'text-slate-500 hover:bg-brand-gray'}`}
>
<Icon name={tab.icon} size={14} /> <span>{tab.label}</span>
</button>
))}
</div>


{activeTab === 'foundation' && (
<div className="animate-in space-y-8">
<div className="grid grid-cols-1 md:grid-cols-2 gap-8">
<div className="bg-white p-8 rounded-3xl shadow-sm border border-brand-gray">
<SectionHeader
title="Capacity & Goal"
iconName="clock"
description="How many hours do you want to work and what is your target profit per hour?"
/>
<div className="space-y-4">
<div className="flex justify-between items-center bg-brand-gray/50 p-4 rounded-2xl gap-4">
<span className="text-sm font-bold text-brand-black shrink-0">Working Hours / Week</span>
<div className="flex-1 max-w-[200px]">
<EditableInput type="number" value={weeklyHours} onChange={e => setWeeklyHours(Number(e.target.value))} className="text-right" />
</div>
</div>
<div className="flex justify-between items-center bg-brand-gray/50 p-4 rounded-2xl gap-4">
<span className="text-sm font-bold text-brand-black shrink-0">Profit Target / Hr</span>
<div className="flex-1 max-w-[200px]">
<EditableInput type="number" value={desiredHourlyWage} onChange={e => setDesiredHourlyWage(Number(e.target.value))} prefix="$" className="text-right" />
</div>
</div>
</div>
</div>


<div className="bg-white p-8 rounded-3xl shadow-sm border border-brand-gray">
<SectionHeader
title="Equipment Lifecycle"
iconName="scissors"
onAdd={addTool}
tip="+ Drill, Lamp, bits"
description="Expensive tools wear out. We divide their cost across their lifespan to find your hourly tool tax."
/>
<div className="space-y-2">
<div className="grid grid-cols-12 gap-2 text-[9px] font-black text-brand-main uppercase px-2 mb-3 tracking-widest opacity-70">
<div className="col-span-6">Tool Name</div>
<div className="col-span-2 text-center">Months</div>
<div className="col-span-3 text-right">Cost</div>
<div className="col-span-1"></div>
</div>
{tools.map(tool => (
<div key={tool.id} className="grid grid-cols-12 gap-2 items-center text-xs px-2 py-2 bg-brand-gray/30 rounded-xl group transition-all hover:bg-brand-gray">
<div className="col-span-6">
<EditableInput value={tool.name} onChange={e => setTools(tools.map(t => t.id === tool.id ? {...t, name: e.target.value} : t))} />
</div>
<div className="col-span-2">
<EditableInput type="number" value={tool.replaceMonths} onChange={e => setTools(tools.map(t => t.id === tool.id ? {...t, replaceMonths: e.target.value} : t))} className="text-center" />
</div>
<div className="col-span-3">
<EditableInput type="number" value={tool.price} onChange={e => setTools(tools.map(t => t.id === tool.id ? {...t, price: e.target.value} : t))} prefix="$" className="text-right" />
</div>
<button onClick={() => setTools(tools.filter(t => t.id !== tool.id))} className="col-span-1 text-slate-300 hover:text-red-500 flex justify-end">
<Icon name="trash-2" size={14}/>
</button>
</div>
))}
</div>
</div>


<div className="bg-white md:col-span-1 p-8 rounded-3xl shadow-sm border border-brand-gray">
<SectionHeader
title="Fixed Monthly Bills"
iconName="dollar-sign"
onAdd={addBill}
tip="+ Rent, Software, WiFi"
description="Every penny you spend on rent, subscriptions, and utilities contributes to your minimum pricing."
/>
<div className="space-y-2">
{fixedExpenses.map(exp => (
<div key={exp.id} className="bg-brand-gray/30 p-3 rounded-xl relative group border border-transparent hover:border-brand-alt2 transition-all flex items-center justify-between gap-4">
<div className="flex-1">
<EditableInput value={exp.name} onChange={e => setFixedExpenses(fixedExpenses.map(i => i.id === exp.id ? {...i, name: e.target.value} : i))} className="text-[11px]" />
</div>
<div className="flex items-center gap-1 w-36">
<EditableInput type="number" value={exp.amount} onChange={e => setFixedExpenses(fixedExpenses.map(i => i.id === exp.id ? {...i, amount: e.target.value} : i))} prefix="$" className="text-right" />
<button onClick={() => setFixedExpenses(fixedExpenses.filter(i => i.id !== exp.id))} className="ml-2 text-slate-300 hover:text-red-500">
<Icon name="x" size={14} />
</button>
</div>
</div>
))}
</div>
</div>
</div>
<NextTabButton target="inventory" label="Next: Go to Stock Room" />
</div>
)}


{activeTab === 'inventory' && (
<div className="animate-in space-y-6">
<div className="px-2">
<h2 className="text-2xl font-black text-brand-black uppercase tracking-tight">Stock Room</h2>
<p className="text-sm text-slate-500 font-medium">List your wholesale costs.</p>
</div>
   
<div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
{['cosmetic', 'disposable', 'nonDisposable'].map(cat => (
<div key={cat} className="bg-white p-6 rounded-3xl border border-brand-gray">
<SectionHeader
title={cat === 'cosmetic' ? "Cosmetics" : cat === 'disposable' ? "Disposables" : "Reusable Life"}
iconName={cat === 'cosmetic' ? 'flask-conical' : cat === 'disposable' ? 'layers' : 'scissors'}
onAdd={() => addInventoryItem(cat)}
tip={cat === 'cosmetic' ? "+ Polishes" : cat === 'disposable' ? "+ Wipes" : "+ Nippers"}
description={cat === 'cosmetic' ? "Volume costs." : cat === 'disposable' ? "Single-use." : "Reusable items."}
/>
<div className="space-y-4">
{inventory[cat].map(item => (
<div key={item.id} className="p-4 bg-brand-gray/30 rounded-2xl flex flex-col gap-1 border border-transparent hover:border-brand-main/20 relative group">
<div className="flex items-center justify-between gap-4 mb-2">
<div className="flex-1">
<EditableInput value={item.name} onChange={e => setInventory({...inventory, [cat]: inventory[cat].map(i => i.id === item.id ? {...i, name: e.target.value} : i)})} className="font-black text-sm uppercase" />
</div>
<button onClick={() => removeInventoryItem(cat, item.id)} className="text-slate-300 hover:text-red-500 transition-colors shrink-0">
<Icon name="trash-2" size={14} />
</button>
</div>
<div className="flex flex-wrap justify-between text-[11px] font-bold text-slate-500 items-center mt-2 gap-2">
{cat === 'cosmetic' ? (
<div className="flex items-center gap-1 bg-white px-2 py-2 rounded-md flex-1 min-w-[70px] overflow-visible">
<EditableInput type="number" value={item.capacity} onChange={e => setInventory({...inventory, cosmetic: inventory.cosmetic.map(i => i.id === item.id ? {...i, capacity: Number(e.target.value)} : i)})} className="border-none p-0 px-1 text-sm" />
<span className="shrink-0 text-[10px] uppercase font-black text-slate-400">ml</span>
</div>
) : cat === 'disposable' ? (
<div className="flex items-center gap-1 bg-white px-2 py-2 rounded-md flex-1 min-w-[70px] overflow-visible">
<EditableInput type="number" value={item.packSize} onChange={e => setInventory({...inventory, disposable: inventory.disposable.map(i => i.id === item.id ? {...i, packSize: Number(e.target.value)} : i)})} className="border-none p-0 px-1 text-sm" />
<span className="shrink-0 text-[10px] uppercase font-black text-slate-400">/ pk</span>
</div>
) : (
<div className="flex items-center gap-1 bg-white px-2 py-2 rounded-md flex-1 min-w-[70px] overflow-visible">
<EditableInput type="number" value={item.uses} onChange={e => setInventory({...inventory, nonDisposable: inventory.nonDisposable.map(i => i.id === item.id ? {...i, uses: Number(e.target.value)} : i)})} className="border-none p-0 px-1 text-sm" />
<span className="shrink-0 text-[10px] uppercase font-black text-slate-400">uses</span>
</div>
)}
<div className="flex items-center gap-1 text-brand-main font-black flex-1 min-w-[70px] overflow-visible">
<EditableInput type="number" value={item.price} onChange={e => setInventory({...inventory, [cat]: inventory[cat].map(i => i.id === item.id ? {...i, price: Number(e.target.value)} : i)})} prefix="$" className="border-none p-0 px-1 text-right text-sm" />
</div>
</div>
</div>
))}
</div>
</div>
))}
</div>
<NextTabButton target="service" label="Next: Start Building Services" />
</div>
)}


{activeTab === 'service' && (
<div className="animate-in space-y-8">
<div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
<div className="lg:col-span-2 space-y-8">
<div className="bg-white p-8 rounded-3xl border border-brand-gray shadow-sm">
<SectionHeader
title="Service Setup"
iconName="calculator"
description="Define duration for labor and overhead costs."
/>
<div className="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label className="text-[10px] font-black text-brand-main uppercase block mb-2 tracking-widest">Service Name</label>
<EditableInput value={service.name} onChange={e => setService({...service, name: e.target.value})} className="text-lg py-5" />
</div>
<div>
<label className="text-[10px] font-black text-brand-main uppercase block mb-2 tracking-widest">Minutes (Time)</label>
<div className="relative">
<EditableInput
type="number"
value={service.duration}
onChange={e => setService({...service, duration: Number(e.target.value)})}
className="text-2xl font-black py-5"
/>
</div>
</div>
</div>
</div>


<div className="bg-white p-8 rounded-3xl border border-brand-gray shadow-sm">
<SectionHeader
title="Product Inventory List"
iconName="flask-conical"
onAdd={() => setShowProductPicker(true)}
tip="Browse Stock Room"
description="Add everything you use for this mani."
/>
<div className="grid grid-cols-1 md:grid-cols-2 gap-4">
{Object.keys(service.selections).map(cat => (
service.selections[cat].map(sel => {
const item = inventory[cat].find(i => i.id === sel.id);
if (!item) return null;
return (
<div key={sel.id} className="p-4 rounded-2xl border-2 border-brand-main/20 bg-brand-main/5 flex items-center gap-4 group hover:border-brand-main transition-all">
<div className="flex-1 min-w-0">
<p className="text-[10px] font-black text-brand-main uppercase mb-1">{cat}</p>
<p className="text-sm font-bold text-brand-black truncate">{item.name}</p>
<div className="flex items-center gap-2 mt-2">
{cat === 'cosmetic' ? (
<div className="flex items-center gap-2 bg-white px-2 py-1 rounded-lg shadow-sm w-40 overflow-visible">
<EditableInput type="number" value={sel.usage} onChange={e => setService({...service, selections: {...service.selections, cosmetic: service.selections.cosmetic.map(s => s.id === sel.id ? {...s, usage: Number(e.target.value)} : s)}})} className="border-none text-xs p-0 px-1" />
<span className="text-[10px] font-bold text-slate-400 uppercase mr-3">ml</span>
</div>
) : cat === 'disposable' ? (
<div className="flex items-center gap-2 bg-white px-2 py-1 rounded-lg shadow-sm w-40 overflow-visible">
<EditableInput type="number" value={sel.qty} onChange={e => setService({...service, selections: {...service.selections, disposable: service.selections.disposable.map(s => s.id === sel.id ? {...s, qty: Number(e.target.value)} : s)}})} className="border-none text-xs p-0 px-1" />
<span className="text-[10px] font-bold text-slate-400 uppercase mr-3">qty</span>
</div>
) : (
<span className="text-[10px] font-bold text-slate-400 italic">Reusable tool</span>
)}
</div>
</div>
<button onClick={() => toggleProductInService(cat, sel.id)} className="text-brand-main opacity-20 group-hover:opacity-100 transition-opacity p-2 hover:bg-brand-main hover:text-white rounded-full">
<Icon name="x" size={18}/>
</button>
</div>
);
})
))}
{Object.values(service.selections).flat().length === 0 && (
<div className="col-span-full py-12 text-center flex flex-col items-center">
<Icon name="package-plus" size={40} className="text-brand-gray mb-3" />
<p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest">No products selected</p>
<button onClick={() => setShowProductPicker(true)} className="mt-4 text-brand-main text-xs font-black uppercase hover:underline">Click to browse Stock Room</button>
</div>
)}
</div>
</div>
</div>


<div className="lg:col-span-1">
<div className="bg-brand-black rounded-[40px] overflow-hidden shadow-2xl border-4 border-white sticky top-4">
<div className="p-12 text-center bg-gradient-to-b from-brand-black to-slate-800">
<h4 className="text-brand-main font-black mb-4 uppercase text-[11px] tracking-[4px]">{service.name}</h4>
<div className="text-8xl font-black text-white leading-none tracking-tighter mb-4 flex justify-center items-start">
<span className="text-3xl font-light text-brand-alt1 mt-2 mr-1">$</span>{Math.ceil(currentPriceData.total)}
</div>
<p className="text-slate-500 text-xs font-bold uppercase tracking-wider">{service.duration} mins duration</p>
</div>
   
<div className="px-8 pb-10 bg-slate-800/50 space-y-4">
<div className="pt-8 flex justify-between items-center text-xs text-white/50 font-bold uppercase tracking-widest border-t border-white/5">
<span>Min Labor & Overhead</span>
<span className="text-brand-alt1 font-black text-sm">${currentPriceData.labor.toFixed(2)}</span>
</div>
<div className="flex justify-between items-center text-xs text-white/50 font-bold uppercase tracking-widest">
<span>Product & Waste</span>
<span className="text-brand-alt1 font-black text-sm">${currentPriceData.products.toFixed(2)}</span>
</div>
<div className="h-px bg-white/10 my-4"></div>
<button
onClick={saveServiceToList}
className={`w-full ${isAddedFeedback ? 'bg-green-500' : 'bg-brand-main hover:bg-brand-alt1 hover:text-brand-black'} text-white font-black py-6 rounded-2xl flex items-center justify-center gap-3 transition-all transform active:scale-95 shadow-xl`}
>
<Icon name={isAddedFeedback ? "check" : "check-circle"} size={20}/>
{isAddedFeedback ? "ADDED!" : "ADD TO MENU"}
</button>
</div>
</div>
</div>
</div>
<NextTabButton target="pricelist" label="Next: Review Price Menu" />
</div>
)}


{activeTab === 'pricelist' && (
<div className="animate-in space-y-6">
<div className="mb-10 text-center">
<h2 className="text-4xl font-black text-brand-black uppercase tracking-tighter">Your Menu</h2>
<p className="text-brand-main font-bold mt-2 uppercase tracking-widest text-xs">Price Menu Lab</p>
</div>
<PriceListContent />
{/* Removed Next button from Price menu as requested */}
</div>
)}


{activeTab === 'help' && (
<div className="animate-in space-y-8">
<div className="bg-white p-10 rounded-[40px] border border-brand-gray shadow-sm">
<h2 className="text-3xl font-black text-brand-black mb-8 flex items-center gap-4">
<div className="p-2 bg-brand-alt1 rounded-xl"><Icon name="help-circle" size={32} className="text-brand-main" /></div>
Detailed Lab Guide
</h2>
   
<div className="space-y-12">
{/* Step 1 */}
<section className="group">
<div className="flex gap-6 items-start">
<div className="w-12 h-12 rounded-2xl bg-brand-gray text-brand-main flex items-center justify-center font-black text-xl shrink-0 group-hover:bg-brand-main group-hover:text-white transition-all shadow-sm">1</div>
<div>
<h4 className="font-black text-brand-black uppercase tracking-wider mb-2">The Foundation: Setting your Hourly Base</h4>
<p className="text-slate-500 text-sm leading-relaxed mb-4">Pricing starts with your time. In this section, you define what you need to earn per hour to be profitable.</p>
<ul className="text-xs space-y-2 text-slate-500 list-disc pl-5 font-medium">
<li><strong>Capacity:</strong> Enter the hours you actually spend working on clients per week.</li>
<li><strong>Profit Target:</strong> This is what you want to take home per hour after all expenses.</li>
<li><strong>Equipment Lifecycle:</strong> List high-cost items like drills or lamps. We divide their price by their lifespan to find your "hourly tax."</li>
<li><strong>Fixed Bills:</strong> Enter your rent, insurance, and Booksy subscription. We spread these monthly costs across your working hours.</li>
</ul>
</div>
</div>
</section>


{/* Step 2 */}
<section className="group">
<div className="flex gap-6 items-start">
<div className="w-12 h-12 rounded-2xl bg-brand-gray text-brand-main flex items-center justify-center font-black text-xl shrink-0 group-hover:bg-brand-main group-hover:text-white transition-all shadow-sm">2</div>
<div>
<h4 className="font-black text-brand-black uppercase tracking-wider mb-2">The Stock Room: Calculating Waste</h4>
<p className="text-slate-500 text-sm leading-relaxed mb-4">Every drop of polish and every individual wipe has a cost. Listing them here allows the lab to calculate product usage to the penny.</p>
<div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
<div className="p-4 bg-brand-gray/30 rounded-2xl border border-brand-main/10">
<Icon name="flask-conical" size={20} className="mb-2 text-brand-main"/>
<p className="text-[11px] font-black text-brand-black uppercase mb-1">Cosmetics</p>
<p className="text-[10px] text-slate-500 leading-tight">Enter total ML and price. We'll find the cost per drop.</p>
</div>
<div className="p-4 bg-brand-gray/30 rounded-2xl border border-brand-main/10">
<Icon name="layers" size={20} className="mb-2 text-brand-main"/>
<p className="text-[11px] font-black text-brand-black uppercase mb-1">Disposables</p>
<p className="text-[10px] text-slate-500 leading-tight">Enter items per pack and price. We'll find the cost per unit.</p>
</div>
<div className="p-4 bg-brand-gray/30 rounded-2xl border border-brand-main/10">
<Icon name="scissors" size={20} className="mb-2 text-brand-main"/>
<p className="text-[11px] font-black text-brand-black uppercase mb-1">Reusable Life</p>
<p className="text-[10px] text-slate-500 leading-tight">Enter average uses per tool and price. We'll find the depreciation.</p>
</div>
</div>
</div>
</div>
</section>


{/* Step 3 */}
<section className="group">
<div className="flex gap-6 items-start">
<div className="w-12 h-12 rounded-2xl bg-brand-gray text-brand-main flex items-center justify-center font-black text-xl shrink-0 group-hover:bg-brand-main group-hover:text-white transition-all shadow-sm">3</div>
<div>
<h4 className="font-black text-brand-black uppercase tracking-wider mb-2">The Builder: Engineering the Service</h4>
<p className="text-slate-500 text-sm leading-relaxed mb-4">Combine your labor and your materials to see your "Minimum Viable Price."</p>
<ul className="text-xs space-y-2 text-slate-500 list-disc pl-5 font-medium">
<li><strong>Minutes:</strong> The longer the service takes, the higher the overhead and labor cost.</li>
<li><strong>Product Picker:</strong> Use the inventory picker to tag every product used. Be precise—even small usages add up!</li>
<li><strong>Real-time Calc:</strong> The card updates instantly. If you realize the cost is too high, try reducing time or finding cheaper wholesale stock.</li>
</ul>
</div>
</div>
</section>


{/* Step 4 */}
<section className="group">
<div className="flex gap-6 items-start">
<div className="w-12 h-12 rounded-2xl bg-brand-gray text-brand-main flex items-center justify-center font-black text-xl shrink-0 group-hover:bg-brand-main group-hover:text-white transition-all shadow-sm">4</div>
<div>
<h4 className="font-black text-brand-black uppercase tracking-wider mb-2">Price Menu: Dynamic Scaling</h4>
<p className="text-slate-500 text-sm leading-relaxed mb-4">This is your master list. The most powerful part? If your rent goes up or you decide to increase your hourly profit, change it once in <strong>Foundation</strong> and every price in this list will update automatically.</p>
</div>
</div>
</section>
</div>


<div className="mt-12 p-6 bg-brand-alt1 rounded-3xl border-2 border-brand-main/10 flex items-center gap-4">
<Icon name="info" className="text-brand-main shrink-0" size={24} />
<p className="text-xs text-brand-main font-bold italic leading-relaxed">
Booksy Pro Tip: This calculator finds your 'Bottom Line'. To ensure maximum profit and a premium brand feel, always round your final Price Menu up to the nearest $5 or $10!
</p>
</div>
</div>
<NextTabButton target="foundation" label="Back to Start" />
</div>
)}
</main>


{showProductPicker && (
<div className="fixed inset-0 z-50 flex items-center justify-center bg-brand-black/80 backdrop-blur-md p-4">
<div className="bg-white rounded-[40px] w-full max-w-[650px] max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-in">
<div className="p-8 border-b border-brand-gray flex items-center justify-between bg-brand-gray/20">
<div>
<h3 className="font-black text-brand-black uppercase tracking-widest text-lg">Inventory Picker</h3>
<p className="text-xs font-bold text-brand-main">Tap items used in your {service.name}</p>
</div>
<button onClick={() => setShowProductPicker(false)} className="text-slate-400 hover:text-brand-black transition-colors bg-brand-gray p-2 rounded-full"><Icon name="x" size={24}/></button>
</div>
<div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
<div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
{Object.keys(inventory).map(cat => (
<div key={cat} className="mb-10">
<h4 className="text-[10px] font-black text-brand-main uppercase mb-4 tracking-[3px] flex items-center gap-2">
<Icon name={cat === 'cosmetic' ? 'flask-conical' : cat === 'disposable' ? 'layers' : 'scissors'} size={14} />
{cat.replace(/([A-Z])/g, ' $1')}
</h4>
<div className="space-y-3">
{inventory[cat].map(item => {
const isSel = service.selections[cat].some(s => s.id === item.id);
return (
<button
key={item.id}
onClick={() => toggleProductInService(cat, item.id)}
className={`w-full flex items-center justify-between p-4 rounded-2xl border-2 text-left transition-all group ${isSel ? 'border-brand-main bg-brand-main/5' : 'border-brand-gray hover:border-brand-main/40'}`}
>
<span className={`text-xs font-black uppercase ${isSel ? 'text-brand-main' : 'text-slate-600'}`}>{item.name}</span>
<div className={`w-6 h-6 rounded-full flex items-center justify-center transition-all ${isSel ? 'bg-brand-main text-white scale-110 shadow-lg' : 'bg-brand-gray text-transparent'}`}>
<Icon name="check" size={12} />
</div>
</button>
);
})}
</div>
</div>
))}
</div>
</div>
<div className="p-8 border-t border-brand-gray bg-brand-gray/20 flex justify-end">
<button onClick={() => setShowProductPicker(false)} className="bg-brand-main text-white font-black px-12 py-4 rounded-2xl shadow-xl hover:bg-brand-black transition-all transform active:scale-95 uppercase tracking-widest text-xs">Confirm Selections</button>
</div>
</div>
</div>
)}
</div>
);
};


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.contentWindow.min.js"></script>
</body>
<script>
  function sendHeight() {
    // We target the root container specifically
    const root = document.getElementById('root');
    if (root) {
      // Get the exact height of the content
      const height = root.getBoundingClientRect().height;
      // Send a very specific message
      window.parent.postMessage({ 
        type: 'setHeight', 
        value: height 
      }, '*');
    }
  }

  // Optimized listeners
  window.addEventListener('load', sendHeight);
  // Use a ResizeObserver - this is the "modern" way to handle height changes
  const resizeObserver = new ResizeObserver(entries => {
    sendHeight();
  });
  
  if (document.getElementById('root')) {
    resizeObserver.observe(document.getElementById('root'));
  }

  // Fallback for tab clicks
  window.addEventListener('click', () => setTimeout(sendHeight, 50));
</script>
</html>
